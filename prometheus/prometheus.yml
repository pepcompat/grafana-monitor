global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance_name: "monitor-server"

  # Remote servers - เพิ่ม IP:port ของ Node Exporter บน server แต่ละตัว
  - job_name: "remote-servers"
    static_configs:
      - targets: ["192.168.1.10:9100"]
        labels:
          instance_name: "web-server-01"
      - targets: ["192.168.1.11:9100"]
        labels:
          instance_name: "web-server-02"
      - targets: ["192.168.1.12:9100"]
        labels:
          instance_name: "db-server-01"

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
